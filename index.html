<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>UkrSZozula — Вхід</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card">
            <h1 style="color: var(--orange); text-align: center;">UkrSZozula</h1>
            <div id="auth-box">
                <input type="text" id="regLogin" placeholder="Логін">
                <input type="password" id="regPass" placeholder="Пароль">
                <button onclick="register()" style="width: 100%;">Зареєструватися</button>
                <hr>
                <button onclick="login()" style="width: 100%; background: #444;">Увійти</button>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
