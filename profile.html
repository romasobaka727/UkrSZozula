<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування — UkrSZozula</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { background-color: #f0f2f5; }
        header { background: #ff8c00; padding: 1rem; border-radius: 0 0 10px 10px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">← Назад до стрічки</a>
</header>

<main class="card">
    <h2>Налаштування профілю</h2>
    <p>Зміни своє ім'я, щоб інші бачили, хто пише пости.</p>
    
    <label for="userNameInput">Твій нікнейм:</label>
    <input type="text" id="userNameInput" placeholder="Наприклад: SuperZozula">
    
    <button style="background: #ff8c00; color: white; border: none;" onclick="updateProfile()">Зберегти зміни</button>
</main>

<script src="script.js"></script>
<script>
    // Відображаємо поточне ім'я
    document.getElementById('userNameInput').value = localStorage.getItem('userName') || '';

    function updateProfile() {
        const newName = document.getElementById('userNameInput').value;
        if (newName.trim() === "") return alert("Введіть ім'я!");
        
        localStorage.setItem('userName', newName);
        alert("Ім'я збережено!");
    }
</script>

</body>
</html>
