<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>UkrSZozula — Стрічка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>UkrSZozula</h2>
        <div>
            <span id="curUser"></span>
            <button onclick="logout()" style="background: #333; margin-left: 10px;">Вихід</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h3>Створити пост</h3>
            <textarea id="postText" placeholder="Що нового?"></textarea>
            <label>Додати фото: <input type="file" id="postFile" accept="image/*"></label>
            <button onclick="createPost()">Опублікувати</button>
        </div>

        <div id="feed"></div>
    </div>

    <script src="auth.js"></script>
    <script src="posts.js"></script>
</body>
</html>
